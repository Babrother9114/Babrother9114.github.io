<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sports Cars 3D Showcase</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 30px;
    padding: 20px;
}

.card {
    width: 250px;
    height: 300px;
    perspective: 1000px;
}

.inner {
    width: 100%;
    height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.card:hover .inner {
    transform: rotateY(180deg);
}

.front, .back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    overflow: hidden;
    backface-visibility: hidden;
}

.front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.back {
    background: #111;
    transform: rotateY(180deg);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
}
</style>

</head>
<body>

<h1>🚗 Sports Cars 3D Showcase</h1>

<div class="container">

    <div class="card">
        <div class="inner">
            <div class="front">
                <img src="https://images.unsplash.com/photo-1542362567-b07e54358753">
            </div>
            <div class="back">
                Lamborghini Aventador
            </div>
        </div>
    </div>

    <div class="card">
        <div class="inner">
            <div class="front">
                <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
            </div>
            <div class="back">
                Ferrari 488 GTB
            </div>
        </div>
        </div>

    <div class="card">
        <div class="inner">
            <div class="front">
                <img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8">
            </div>
            <div class="back">
                Porsche 911 Turbo
            </div>
        </div>
    </div>

</div>

</body>
</html>
